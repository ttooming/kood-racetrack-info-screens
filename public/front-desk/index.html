<!DOCTYPE html>
<html lang="et">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Front desk</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Front desk</h1>
        <br>
        <div class="admin-panel">
            <div class="session-controls">
                <h2>Configure sessions</h2>

                <label for="session-title">Input the session name:</label>
                <input type="text" id="session-title">

                <label for="session-date">Input time:</label>
                <input type="datetime-local" id="session-date">

                <div class="buttons">
                    <button class="session-button" id="add-session">Add</button>
                    <button class="session-button" id="remove-session">Remove</button>
                </div>
            </div>
            <div class="racer-controls">
                <h2>Configure racers</h2>
                <label for="racer-name">Input the Racer name:</label>
                <input type="text" id="racer-name">
                <label for="existed-cars">Choose car number:</label>
                <select name="cars" id="existed-cars">
                </select>
                <label for="existed-sessions">Choose the session:</label>
                <select name="sessions" id="existed-sessions">
                </select>

                <div class="buttons">
                    <button class="racer-button" id="add-racer">Add</button>
                    <button class="racer-button" id="edit-racer">Edit</button>
                    <button class="racer-button" id="remove-racer">Remove</button>
                </div>
            </div>

        </div>
        <div class="table-section">
            <table id="upcoming-sessions">
            </table>
        </div>


    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>

</html>

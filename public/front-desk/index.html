<!DOCTYPE html>
<html lang="et">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Front Desk | Beachside Racetrack</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>FRONT DESK</h1>
        <div class="admin-panel">
            <div class="session-controls">
                <h2>CONFIGURE SESSIONS</h2>
                <label for="session-title">INPUT SESSION NAME:</label>
                <input type="text" id="session-title">

                <label for="session-date">SESSION DATE:</label>
                <input type="date" id="session-date">
                <label for="session-time">SESSION TIME:</label>
                <input type="time" id="session-time">

                <div class="buttons">
                    <button class="session-button" id="add-session">ADD</button>
                    <button class="session-button" id="remove-session">REMOVE</button>
                </div>
            </div>
            <div class="driver-controls">
                <h2>CONFIGURE DRIVERS</h2>
                <label for="driver-name">INPUT DRIVER NAME:</label>
                <input type="text" id="driver-name">
                <label for="existed-cars">CHOOSE CAR NUMBER:</label>
                <select name="cars" id="existed-cars">
                </select>
                <label for="existed-sessions">CHOOSE SESSION:</label>
                <select name="sessions" id="existed-sessions">
                </select>

                <div class="buttons">
                    <button class="driver-button" id="add-driver">ADD</button>
                    <button class="driver-button" id="edit-driver">EDIT</button>
                    <button class="driver-button" id="remove-driver">REMOVE</button>
                </div>
            </div>
        </div>

        <div class="table-section">
            <table id="upcoming-sessions">
            </table>
        </div>
    </div>


    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="et">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Race Control</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="admin-panel">
        <h1>Race Control</h1>

        <div class="session-controls">
            <button id="start-btn" class="btn-start">Start New Race</button>
            <p id="status-text">Current Status: <span id="current-mode">OFFLINE</span></p>
        </div>

        <hr>

        <div class="flag-controls">
            <button id="safe" class="btn-f1 btn-safe">Track Clear</button>
            <button id="hazard" class="btn-f1 btn-hazard">Hazard (Yellow)</button>
            <button id="danger" class="btn-f1 btn-danger">Danger (Red)</button>
            <button id="finish" class="btn-f1 btn-finish">Finish</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>

</html>

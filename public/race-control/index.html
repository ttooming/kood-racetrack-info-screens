<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Race Control | Beachside Racetrack</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="admin-panel">
        <h1>RACE CONTROL</h1>
        <div class="timer-bar">
            <span class="timer-label">SESSION TIME Remaining</span>
            <div id="race-timer">00:00</div>
        </div>

        <div class="session-controls">
            <button id="start-btn" class="btn-main btn-start">Start New Race</button>
            <button id="end-btn" class="btn-main btn-end">End Session</button>
        </div>

        <button id="view-drivers-btn" class="btn-info">View Drivers</button>

        <p id="status-display">Status: <span id="current-mode">OFF</span></p>

        <hr>

        <div class="flag-controls">
            <button id="safe" class="btn-f1 btn-safe">Track Clear</button>
            <button id="hazard" class="btn-f1 btn-hazard">Hazard (Yellow)</button>
            <button id="danger" class="btn-f1 btn-danger">Danger (Red)</button>
            <button id="finish" class="btn-f1 btn-finish">Finish</button>
        </div>
    </div>

    <div id="next-session-modal" class="modal hidden">
        <div class="modal-content">
            <header class="modal-header">
                <h2 id="modal-title">DRIVERS ON TRACK</h2>
            </header>
            <div id="modal-driver-list"></div>
            <button id="modal-confirm-btn" class="confirm-btn">CLOSE</button>
        </div>
    </div>


    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>

</html>
